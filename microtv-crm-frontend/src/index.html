<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>CRM MicroTV</title>
    <base href="/" />
    <meta name="theme-color" content="#ffffff" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="CRM MicroTV" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <link rel="icon" type="image/x-icon" href="/images/branding/favicon.ico?v=20260511" />
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/images/branding/logo-192.png?v=20260511" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
    <script>
      (function () {
        var storageKey = 'crm-theme-preference';
        var storedTheme = null;

        try {
          storedTheme = localStorage.getItem(storageKey);
        } catch (_error) {
          storedTheme = null;
        }

        var systemTheme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        var resolvedTheme = storedTheme === 'dark' || storedTheme === 'light' ? storedTheme : systemTheme;

        document.documentElement.classList.add('theme-' + resolvedTheme);

        var metaThemeColor = document.querySelector('meta[name="theme-color"]');
        if (metaThemeColor) {
          metaThemeColor.setAttribute('content', resolvedTheme === 'dark' ? '#10141d' : '#ffffff');
        }
      })();
    </script>
    <script src="runtime-config.js"></script>
  </head>
  <body>
    <app-root></app-root>
  </body>
</html>
