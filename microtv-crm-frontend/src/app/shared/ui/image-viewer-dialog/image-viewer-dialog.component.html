<div class="image-viewer-dialog">
  <button
    mat-icon-button
    type="button"
    class="image-viewer-dialog__close"
    aria-label="Cerrar imagen"
    (click)="close()"
  >
    <mat-icon>close</mat-icon>
  </button>
  @if (mediaType === 'video') {
    <video
      class="image-viewer-dialog__media"
      controls
      autoplay
      playsinline
    >
      <source [src]="mediaUrl" [type]="data.mimeType || 'video/mp4'" />
    </video>
  } @else {
    <img
      class="image-viewer-dialog__media"
      [src]="mediaUrl"
      [alt]="data.altText"
    />
  }
</div>
