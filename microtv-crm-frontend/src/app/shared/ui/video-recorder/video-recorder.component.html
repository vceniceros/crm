<div class="video-recorder">
  <video #preview autoplay muted playsinline></video>

  <div class="video-recorder__controls">
    @if (recorder.isRecording()) {
      <button mat-flat-button color="warn" type="button" (click)="stop()">
        <mat-icon>stop</mat-icon>
        <span>Detener</span>
      </button>
    } @else {
      <button mat-flat-button color="warn" type="button" (click)="start()">
        <mat-icon>fiber_manual_record</mat-icon>
        <span>Grabar</span>
      </button>
    }

    <button mat-stroked-button type="button" (click)="cancel()">
      <mat-icon>close</mat-icon>
      <span>Cancelar</span>
    </button>

    <span>{{ recorder.elapsedSeconds() }}s / {{ remainingSeconds() }}s</span>
  </div>

  @if (errorMessage(); as message) {
    <p class="video-recorder__error">{{ message }}</p>
  }
</div>
