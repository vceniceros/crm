@if (viewModel$ | async; as viewModel) {
  <button
    type="button"
    class="sidebar-user-switcher"
    [matMenuTriggerFor]="usersMenu"
    aria-label="Ver cuenta activa"
  >
    <app-user-avatar [initials]="viewModel.activeUser.initials" [size]="44" />

    <div class="sidebar-user-switcher__copy">
      <p class="sidebar-user-switcher__name">{{ viewModel.activeUser.name }}</p>
      <p class="sidebar-user-switcher__role">{{ viewModel.activeUser.roleLabel }}</p>
    </div>

    <mat-icon class="sidebar-user-switcher__icon">unfold_more</mat-icon>
  </button>

  <mat-menu #usersMenu="matMenu" xPosition="before" yPosition="above" class="sidebar-user-switcher__menu-panel">
    <div class="sidebar-user-switcher__menu" aria-label="Cuenta activa del CRM">
      <div class="sidebar-user-switcher__account-card">
        <app-user-avatar [initials]="viewModel.activeUser.initials" [size]="38" />

        <div class="sidebar-user-switcher__menu-copy">
          <span class="sidebar-user-switcher__menu-name">{{ viewModel.activeUser.name }}</span>
          <span class="sidebar-user-switcher__menu-role">{{ viewModel.activeUser.roleLabel }}</span>
          <span class="sidebar-user-switcher__menu-email">{{ viewModel.email }}</span>
        </div>
      </div>

      <div class="sidebar-user-switcher__chips">
        @for (roleKey of viewModel.roleKeys; track roleKey) {
          <span class="sidebar-user-switcher__chip">{{ roleKey }}</span>
        }
      </div>

      <button mat-menu-item type="button" class="sidebar-user-switcher__logout" (click)="logout()">
        <mat-icon>logout</mat-icon>
        <span>Cerrar sesión</span>
      </button>
    </div>
  </mat-menu>
}
