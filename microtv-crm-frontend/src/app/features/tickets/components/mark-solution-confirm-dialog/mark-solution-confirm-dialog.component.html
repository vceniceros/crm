<h2 mat-dialog-title>Mark comment as solution</h2>

<mat-dialog-content>
  <p>This will close the ticket using this existing comment as closure evidence.</p>
  <p>The regular close flow remains available for manual closure with a new comment.</p>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button type="button" mat-dialog-close="false">Cancel</button>
  <button mat-flat-button color="primary" type="button" mat-dialog-close="true">Mark as solution</button>
</mat-dialog-actions>
